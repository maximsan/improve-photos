appId: com.maksim.cleanup-photos
productName: Cleanup Photos
copyright: Copyright © 2025 Maksim Shchutski
directories:
  buildResources: build
  output: dist

# Files included in the package
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{vitest.config.ts,tests}'

# Native modules must live outside the asar archive so the OS can load them
asarUnpack:
  - resources/**
  - node_modules/sharp/**
  - node_modules/@img/**
  - '**/@img/**'

# macOS — DMG only
mac:
  target:
    - target: dmg
      arch:
        - universal
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  # Hardened runtime is required for Apple notarization. It is a no-op for
  # unsigned local builds because the entitlements file already grants the
  # JIT / dynamic-code allowances Electron needs at runtime.
  hardenedRuntime: true
  # Local Gatekeeper assessment runs *before* notarization stapling, so it
  # always fails on a freshly signed-but-not-yet-stapled .app. Skip it and
  # rely on `spctl --assess` post-stapling for the real check.
  gatekeeperAssess: false
  # The afterSign hook (build/notarize.cjs) owns notarization end-to-end,
  # so electron-builder's built-in notarize must stay off to avoid double
  # submission.
  notarize: false
  # pnpm installs both @img/sharp-darwin-arm64 and @img/sharp-darwin-x64 into
  # the same node_modules tree, so each per-arch build ends up with identical
  # copies of every @img Mach-O binary. @electron/universal refuses to merge
  # byte-identical Mach-O files unless they are covered by `x64ArchFiles`,
  # so list the @img tree there to keep one copy from the x64 template (sharp
  # picks the right .node at runtime by inspecting its own platform).
  mergeASARs: true
  x64ArchFiles: '**/@img/**'

# Notarization is gated inside the hook by MAC_NOTARIZE + Apple credentials;
# no-op without them so local unsigned builds are unaffected.
afterSign: build/notarize.cjs

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
  title: ${productName} ${version}

# Do not rebuild native modules during packaging — pnpm postinstall handles this
npmRebuild: false
